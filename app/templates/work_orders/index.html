{% extends 'base.html' %}

{% block title %}Órdenes de Trabajo | Sistema de Bodega{% endblock %}

{% block content %}
{% include 'components/page_header.html' with context %}

<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body">

        <div class="d-flex justify-content-end mb-3">
            <a href="{{ url_for('work_orders.create_work_order_page') }}" class="btn btn-primary">
                Nueva OT
            </a>
        </div>

        <form id="filtersForm" class="row g-3 mb-4">
            <div class="col-12 col-md-5">
                <input
                    type="text"
                    id="ot_number"
                    name="ot_number"
                    class="form-control"
                    placeholder="Buscar por número de OT..."
                    value="{{ ot_number or '' }}"
                >
            </div>

            <div class="col-12 col-md-5">
                <select id="status" name="status" class="form-select">
                    <option value="">Todos los estados</option>
                    <option value="EN_PROCESO" {% if status == "EN_PROCESO" %}selected{% endif %}>EN_PROCESO</option>
                    <option value="FINALIZADA" {% if status == "FINALIZADA" %}selected{% endif %}>FINALIZADA</option>
                    <option value="CERRADA" {% if status == "CERRADA" %}selected{% endif %}>CERRADA</option>
                </select>
            </div>

            <div class="col-12 col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    Filtrar
                </button>
            </div>
        </form>

        <div id="workOrdersTableContainer">

            <div class="text-center py-5">

                <div class="spinner-border text-primary mb-3" role="status"></div>

                <div class="fw-semibold">
                    Cargando órdenes de trabajo...
                </div>

                <div class="text-muted small mt-2">
                    Espere un momento.
                </div>

            </div>

        </div>

    </div>
</div>

<script>
(function () {

    const container = document.getElementById("workOrdersTableContainer");

    const filtersForm = document.getElementById("filtersForm");

    const statusInput = document.getElementById("status");

    const otNumberInput = document.getElementById("ot_number");

    async function loadWorkOrders(page = 1) {

        try {

            container.style.opacity = "0.55";

            const params = new URLSearchParams({
                page: page,
                status: statusInput.value || "",
                ot_number: otNumberInput.value || ""
            });

            const response = await fetch(
                `/work-orders/partial/list?${params.toString()}`,
                {
                    headers: {
                        "X-Requested-With": "XMLHttpRequest"
                    }
                }
            );

            if (!response.ok) {
                throw new Error("Error cargando órdenes.");
            }

            const html = await response.text();

            container.innerHTML = html;

            container.style.opacity = "1";

            bindPagination();

        } catch (error) {

            console.error(error);

            container.style.opacity = "1";

            container.innerHTML = `
                <div class="alert alert-danger rounded-4">
                    Error cargando órdenes de trabajo.
                </div>
            `;
        }
    }

    function bindPagination() {

        const links = container.querySelectorAll(".pagination a");

        links.forEach(link => {

            link.addEventListener("click", function (e) {

                e.preventDefault();

                const url = new URL(this.href);

                const page = url.searchParams.get("page") || 1;

                loadWorkOrders(page);

            });

        });

    }

    filtersForm.addEventListener("submit", function (e) {

        e.preventDefault();

        loadWorkOrders();

    });

    loadWorkOrders();

})();
</script>

{% endblock %}
