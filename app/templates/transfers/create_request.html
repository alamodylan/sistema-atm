{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h3>Nueva Solicitud de Traslado</h3>

    <form method="POST" id="transfer-request-form">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Bodega que solicita</label>
                <select name="origin_warehouse_id" class="form-control" required>
                    <option value="">Seleccione una bodega</option>
                    {% for w in accessible_warehouses %}
                    <option value="{{ w.id }}">{{ w.name }}</option>
                    {% endfor %}
                </select>
                {% if not accessible_warehouses %}
                <div class="form-text text-danger">
                    No tienes bodegas asignadas en tus permisos.
                </div>
                {% endif %}
            </div>

            <div class="col-md-6 mb-3">
                <label>Bodega a la que se solicita</label>
                <select name="destination_warehouse_id" class="form-control" required>
                    <option value="">Seleccione una bodega</option>
                    {% for w in supplying_warehouses %}
                    <option value="{{ w.id }}">{{ w.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Prioridad</label>
                <select name="priority" class="form-control">
                    <option value="NORMAL">Normal</option>
                    <option value="ALTA">Alta</option>
                </select>
            </div>

            <div class="col-md-12 mb-3">
                <label>Notas generales</label>
                <textarea name="notes" class="form-control" rows="3"></textarea>
            </div>
        </div>

        <hr class="my-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Artículos a solicitar</h5>
            <small class="text-muted">Puede agregar varias líneas en una sola solicitud</small>
        </div>

        <div id="request-lines-wrapper"></div>

        <div class="mb-4">
            <button type="button" class="btn btn-outline-secondary" id="add-line-btn">
                Agregar otra línea
            </button>
        </div>

        <button class="btn btn-primary">Crear</button>

    </form>

</div>

<template id="request-line-template">
    <div class="request-line border rounded p-3 mb-3 position-relative">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Artículo</label>

                <input type="text"
                       class="form-control article-search-input"
                       placeholder="Buscar por código o nombre..."
                       autocomplete="off"
                       required>

                <input type="hidden"
                       name="article_id[]"
                       class="article-id-input">

                <div class="list-group mt-2 d-none article-results shadow-sm"></div>

                <div class="form-text">
                    Escriba al menos 2 caracteres para buscar.
                </div>
            </div>

            <div class="col-md-2 mb-3">
                <label>Cantidad</label>
                <input
                    type="number"
                    step="0.01"
                    min="0.01"
                    name="quantity_requested[]"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-4 mb-3">
                <label>Nota de línea</label>
                <input
                    type="text"
                    name="line_notes[]"
                    class="form-control"
                    placeholder="Opcional"
                >
            </div>

        </div>

        <button type="button"
                class="btn btn-sm btn-outline-danger remove-line-btn d-none">
            Eliminar línea
        </button>

    </div>
</template>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const addLineBtn = document.getElementById("add-line-btn");
    const wrapper = document.getElementById("request-lines-wrapper");
    const template = document.getElementById("request-line-template");

    function createLine() {
        const fragment = template.content.cloneNode(true);
        const line = fragment.querySelector(".request-line");

        const searchInput = line.querySelector(".article-search-input");
        const articleIdInput = line.querySelector(".article-id-input");
        const resultsBox = line.querySelector(".article-results");
        const removeBtn = line.querySelector(".remove-line-btn");

        let searchTimer;

        function refreshRemoveButtons() {
            const lines = wrapper.querySelectorAll(".request-line");

            lines.forEach(function (item) {
                const btn = item.querySelector(".remove-line-btn");

                if (lines.length <= 1) {
                    btn.classList.add("d-none");
                } else {
                    btn.classList.remove("d-none");
                }
            });
        }

        searchInput.addEventListener("input", function () {
            clearTimeout(searchTimer);

            const term = this.value.trim();
            articleIdInput.value = "";

            if (term.length < 2) {
                resultsBox.innerHTML = "";
                resultsBox.classList.add("d-none");
                return;
            }

            resultsBox.innerHTML = `
                <div class="list-group-item text-muted">
                    Buscando artículos...
                </div>
            `;
            resultsBox.classList.remove("d-none");

            searchTimer = setTimeout(async function () {
                try {
                    const response = await fetch(
                        `/transfers/articles/search?q=${encodeURIComponent(term)}`,
                        {
                            headers: {
                                "X-Requested-With": "XMLHttpRequest"
                            }
                        }
                    );

                    if (!response.ok) {
                        throw new Error("Error buscando artículos.");
                    }

                    const data = await response.json();

                    resultsBox.innerHTML = "";

                    if (!data.items || !data.items.length) {
                        resultsBox.innerHTML = `
                            <div class="list-group-item text-muted">
                                Sin resultados
                            </div>
                        `;
                    } else {
                        data.items.forEach(function (item) {
                            const btn = document.createElement("button");
                            btn.type = "button";
                            btn.className = "list-group-item list-group-item-action";

                            btn.innerHTML = `
                                <strong>${item.code || ""}</strong>
                                <div class="small text-muted">
                                    ${item.name || ""}
                                </div>
                            `;

                            btn.addEventListener("click", function () {
                                searchInput.value = `${item.code || ""} - ${item.name || ""}`;
                                articleIdInput.value = item.id;
                                resultsBox.classList.add("d-none");
                            });

                            resultsBox.appendChild(btn);
                        });
                    }

                    resultsBox.classList.remove("d-none");

                } catch (error) {
                    console.error(error);

                    resultsBox.innerHTML = `
                        <div class="list-group-item text-danger">
                            Error buscando artículos.
                        </div>
                    `;
                    resultsBox.classList.remove("d-none");
                }
            }, 300);
        });

        removeBtn.addEventListener("click", function () {
            line.remove();
            refreshRemoveButtons();
        });

        wrapper.appendChild(fragment);
        refreshRemoveButtons();
    }

    addLineBtn.addEventListener("click", function () {
        createLine();
    });

    document.addEventListener("click", function (event) {
        if (
            !event.target.closest(".article-results") &&
            !event.target.closest(".article-search-input")
        ) {
            document.querySelectorAll(".article-results").forEach(function (box) {
                box.classList.add("d-none");
            });
        }
    });

    document.getElementById("transfer-request-form").addEventListener("submit", function (event) {
        let isValid = true;

        wrapper.querySelectorAll(".request-line").forEach(function (line) {
            const articleIdInput = line.querySelector(".article-id-input");
            const searchInput = line.querySelector(".article-search-input");

            if (!articleIdInput.value) {
                isValid = false;
                searchInput.classList.add("is-invalid");
            } else {
                searchInput.classList.remove("is-invalid");
            }
        });

        if (!isValid) {
            event.preventDefault();
            alert("Debe seleccionar un artículo válido desde la búsqueda.");
        }
    });

    createLine();
});
</script>

{% endblock %}
