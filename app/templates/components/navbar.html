<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm px-4 py-3 sticky-top">
    <div class="container-fluid p-0">

        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-secondary d-lg-none"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarOffcanvas"
                    aria-controls="sidebarOffcanvas">
                <i class="bi bi-list"></i>
            </button>

            <div>
                <h1 class="h5 mb-0 fw-bold text-dark">Sistema de Bodega y Taller</h1>
                <small class="text-secondary">
                    Artículos, inventario, compras, órdenes de trabajo y reportes
                </small>
            </div>
        </div>

        <div class="d-flex align-items-center gap-3">

            <div class="dropdown">
                <button class="btn btn-outline-primary btn-sm dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">

                    {% if active_site %}
                        <i class="bi bi-geo-alt me-1"></i>{{ active_site.name }}
                    {% else %}
                        <i class="bi bi-geo-alt me-1"></i>Seleccionar predio
                    {% endif %}
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                    {% for site in sites %}
                        <li>
                            <a class="dropdown-item {% if active_site and site.id == active_site.id %}active{% endif %}"
                               href="{{ url_for('dashboard.set_site', site_id=site.id) }}">
                                {{ site.name }}
                            </a>
                        </li>
                    {% endfor %}
                </ul>
            </div>

            <button class="btn btn-light position-relative border" disabled>
                <i class="bi bi-bell fs-5 text-dark"></i>
                {% if notifications_count and notifications_count > 0 %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ notifications_count }}
                    </span>
                {% endif %}
            </button>

            <div class="dropdown">
                <button class="btn btn-light border d-flex align-items-center gap-2 px-3"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">

                    <i class="bi bi-person-circle fs-5"></i>

                    <span class="fw-semibold">
                        {{ current_user.full_name if current_user.is_authenticated else "Usuario" }}
                    </span>

                    <i class="bi bi-chevron-down small"></i>
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">

                    <li>
                        <span class="dropdown-item-text small text-muted">
                            {{ current_user.username if current_user.is_authenticated else "" }}
                        </span>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item disabled" href="#">
                            <i class="bi bi-person me-2"></i>Mi perfil
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item disabled" href="#">
                            <i class="bi bi-gear me-2"></i>Configuración
                        </a>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <form method="POST" action="{{ url_for('auth.logout') }}" class="m-0">
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                            </button>
                        </form>
                    </li>

                </ul>
