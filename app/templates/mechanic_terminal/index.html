{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="text-center mb-4">
        <h3 class="mb-1">Terminal de Taller</h3>
        <p class="text-muted mb-0">Escanee el código del mecánico para continuar.</p>
    </div>

    <input id="scanner" autofocus style="opacity:0; position:absolute; left:-9999px;">

    <div class="alert alert-info text-center" id="scanStatus">
        Esperando escaneo...
    </div>

    <div id="terminalContent" class="d-none">

        <!-- MECANICO -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body d-flex justify-content-between">
                <div>
                    <h5 id="mechanicName"></h5>
                    <small id="mechanicCode"></small>
                </div>
                <button class="btn btn-outline-secondary" id="resetTerminalBtn">Nuevo escaneo</button>
            </div>
        </div>

        <!-- OT -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body">
                <h5>Órdenes activas</h5>
                <div id="workOrdersList" class="row g-3"></div>
                <div id="noWorkOrders" class="text-muted d-none">
                    Este mecánico no tiene OT en proceso.
                </div>
            </div>
        </div>

        <!-- ACCIONES -->
        <div id="selectedWorkOrderSection" class="d-none">
            <div class="card border-0 shadow-sm rounded-4 mb-4">
                <div class="card-body">
                    <h5 id="selectedWorkOrderLabel"></h5>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" id="loadArticlesBtn">Solicitar artículo</button>
                        <button class="btn btn-warning" id="loadToolsBtn">Solicitar herramienta</button>
                        <button class="btn btn-outline-dark" id="loadBorrowedToolsBtn">Devolver herramienta</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- LISTADO -->
        <div id="itemsSection" class="card border-0 shadow-sm rounded-4 d-none">
            <div class="card-body">
                <h5 id="itemsTitle"></h5>

                <input id="itemsSearch" class="form-control mb-2" placeholder="Buscar...">

                <div id="itemsList"></div>

                <div id="noItemsMessage" class="text-muted d-none">
                    No hay elementos disponibles.
                </div>
            </div>
        </div>

        <!-- 🔥 CARRITO NUEVO -->
        <div id="cartSection" class="card border-0 shadow-sm rounded-4 mt-3 d-none">
            <div class="card-body">
                <h5>Solicitud</h5>
                <div id="cartList"></div>
                <button class="btn btn-success mt-2" id="submitRequestBtn">
                    Enviar solicitud
                </button>
            </div>
        </div>

    </div>
</div>

<script>
let scannerInput = "";
let currentMechanic = null;
let currentWorkOrders = [];
let selectedWorkOrder = null;
let currentItems = [];
let cart = []; // 🔥 NUEVO

const scannerEl = document.getElementById("scanner");

function keepScannerFocus() {
    if (document.activeElement !== scannerEl) {
        scannerEl.focus();
    }
}
setInterval(keepScannerFocus, 500);

// ---------------- RESET ----------------
function resetTerminal() {
    scannerInput = "";
    currentMechanic = null;
    currentWorkOrders = [];
    selectedWorkOrder = null;
    currentItems = [];
    cart = [];

    document.getElementById("terminalContent").classList.add("d-none");
    document.getElementById("cartSection").classList.add("d-none");
}

// ---------------- SCAN ----------------
document.addEventListener("keydown", async function(e) {
    if (e.key === "Enter") {

        const res = await fetch("/terminal/scan", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({code: scannerInput})
        });

        const data = await res.json();

        if (res.ok) {
            currentMechanic = data;
            currentWorkOrders = data.work_orders;

            document.getElementById("terminalContent").classList.remove("d-none");
            document.getElementById("mechanicName").innerText = data.mechanic;
            document.getElementById("mechanicCode").innerText = data.code;

            renderWorkOrders();
        }

        scannerInput = "";
        return;
    }

    if (e.key.length === 1) scannerInput += e.key;
});

// ---------------- OT ----------------
function renderWorkOrders() {
    const container = document.getElementById("workOrdersList");
    container.innerHTML = "";

    if (!currentWorkOrders.length) {
        document.getElementById("noWorkOrders").classList.remove("d-none");
        return;
    }

    currentWorkOrders.forEach(ot => {
        const col = document.createElement("div");
        col.className = "col-12 col-md-6 col-xl-4";

        col.innerHTML = `
            <button class="btn btn-outline-primary w-100 p-3">
                OT ${ot.number}
            </button>
        `;

        col.querySelector("button").onclick = () => {
            selectedWorkOrder = ot;
            document.getElementById("selectedWorkOrderSection").classList.remove("d-none");
            document.getElementById("selectedWorkOrderLabel").innerText = "OT " + ot.number;
        };

        container.appendChild(col);
    });
}

// ---------------- ITEMS ----------------
async function loadItems(url, title) {
    document.getElementById("itemsTitle").innerText = title;

    const res = await fetch(url);
    const data = await res.json();

    currentItems = data.items;
    renderItems();

    document.getElementById("itemsSection").classList.remove("d-none");
}

function renderItems() {
    const container = document.getElementById("itemsList");
    container.innerHTML = "";

    currentItems.forEach(item => {
        const row = document.createElement("div");
        row.className = "border p-2 mb-1 d-flex justify-content-between";

        row.innerHTML = `
            <div>${item.code} - ${item.name}</div>
            <button class="btn btn-sm btn-success">Agregar</button>
        `;

        row.querySelector("button").onclick = () => {
            const qty = prompt("Cantidad:");
            if (!qty) return;

            cart.push({
                article_id: item.article_id,
                name: item.name,
                quantity: qty
            });

            renderCart();
        };

        container.appendChild(row);
    });
}

// ---------------- CARRITO ----------------
function renderCart() {
    const container = document.getElementById("cartList");
    container.innerHTML = "";

    cart.forEach((c, i) => {
        const row = document.createElement("div");

        row.innerHTML = `
            ${c.name} - ${c.quantity}
            <button class="btn btn-sm btn-danger ms-2">X</button>
        `;

        row.querySelector("button").onclick = () => {
            cart.splice(i,1);
            renderCart();
        };

        container.appendChild(row);
    });

    document.getElementById("cartSection").classList.remove("d-none");
}

// ---------------- ENVIAR ----------------
document.getElementById("submitRequestBtn").onclick = async () => {

    if (!selectedWorkOrder) return;
    if (!cart.length) return alert("Sin items");

    const res = await fetch(`/terminal/work-orders/${selectedWorkOrder.id}/requests/submit`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({lines: cart})
    });

    const data = await res.json();

    if (data.ok) {
        alert("Solicitud enviada");
        cart = [];
        renderCart();
        document.getElementById("cartSection").classList.add("d-none");
    } else {
        alert(data.error);
    }
};

// ---------------- BOTONES ----------------
document.getElementById("loadArticlesBtn").onclick = () => {
    loadItems(`/terminal/articles/${selectedWorkOrder.warehouse_id}`, "Solicitar artículo");
};

document.getElementById("loadToolsBtn").onclick = () => {
    loadItems(`/terminal/tools/${selectedWorkOrder.warehouse_id}`, "Solicitar herramienta");
};

document.getElementById("loadBorrowedToolsBtn").onclick = () => {
    loadItems(`/terminal/borrowed-tools/${selectedWorkOrder.id}`, "Devolver herramienta");
};

document.getElementById("resetTerminalBtn").onclick = resetTerminal;
</script>
{% endblock %}
