{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h2 class="fw-bold mb-1">Entradas a inventario</h2>
            <p class="text-muted mb-0">
                Recepciones de compra registradas con impacto real en inventario.
            </p>
        </div>

        <div>
            <a href="{{ url_for('purchases.create_entry') }}" class="btn btn-dark rounded-3">
                <i class="bi bi-plus-lg me-2"></i>Nueva entrada
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-4">
            <form id="filtersForm" class="row g-3">

                <div class="col-12 col-md-10">
                    <label class="form-label fw-semibold">Buscar</label>
                    <input
                        type="text"
                        name="search"
                        id="searchInput"
                        value="{{ search or '' }}"
                        class="form-control rounded-3"
                        placeholder="Número de entrada o factura"
                    >
                </div>

                <div class="col-12 col-md-2 d-grid align-self-end">
                    <button
                        type="submit"
                        class="btn btn-outline-dark rounded-3"
                    >
                        <i class="bi bi-search me-2"></i>Filtrar
                    </button>
                </div>

            </form>
        </div>
    </div>

    <div
        id="entriesContainer"
        data-url="{{ url_for('purchases.list_entries_partial') }}"
    >
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-5 text-center">
                <div class="spinner-border text-dark mb-3" role="status"></div>
                <h5 class="fw-bold mb-1">Cargando entradas...</h5>
                <p class="text-muted mb-0">
                    Consultando recepciones de inventario.
                </p>
            </div>
        </div>
    </div>

</div>

<script>
(function () {

    const filtersForm = document.getElementById("filtersForm");
    const entriesContainer = document.getElementById("entriesContainer");

    async function loadEntries(page = 1) {
        const formData = new FormData(filtersForm);
        const params = new URLSearchParams(formData);

        params.set("page", page);

        entriesContainer.innerHTML = `
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-5 text-center">
                    <div class="spinner-border text-dark mb-3" role="status"></div>
                    <h5 class="fw-bold mb-1">Cargando entradas...</h5>
                    <p class="text-muted mb-0">
                        Consultando recepciones de inventario.
                    </p>
                </div>
            </div>
        `;

        try {
            const response = await fetch(
                `${entriesContainer.dataset.url}?${params.toString()}`,
                {
                    headers: {
                        "X-Requested-With": "XMLHttpRequest"
                    }
                }
            );

            if (!response.ok) {
                throw new Error("Error cargando entradas.");
            }

            const html = await response.text();

            entriesContainer.innerHTML = html;

            bindPagination();

        } catch (error) {
            console.error(error);

            entriesContainer.innerHTML = `
                <div class="alert alert-danger rounded-4">
                    Error cargando entradas a inventario.
                </div>
            `;
        }
    }

    function bindPagination() {
        document
            .querySelectorAll(".ajax-page-link")
            .forEach(function (link) {
                link.addEventListener("click", function (event) {
                    event.preventDefault();

                    const page = this.dataset.page || "1";

                    loadEntries(page);
                });
            });
    }

    filtersForm.addEventListener("submit", function (event) {
        event.preventDefault();

        loadEntries(1);
    });

    loadEntries();

})();
</script>
{% endblock %}
