{% extends "base.html" %}

{% block content %}

<div class="container-fluid py-4">

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">

        <div>
            <h2 class="fw-bold mb-1">
                Solicitudes de compra
            </h2>

            <p class="text-muted mb-0">
                Listado general de solicitudes registradas.
            </p>
        </div>

        <a
            href="{{ url_for('purchases.create_request') }}"
            class="btn btn-dark rounded-3"
        >
            <i class="bi bi-plus-circle me-2"></i>
            Nueva solicitud
        </a>

    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4">

        <div class="card-body p-3 p-lg-4">

            <form id="filtersForm" class="row g-3">

                <div class="col-12 col-md-4">

                    <label class="form-label fw-semibold">
                        Buscar
                    </label>

                    <input
                        type="text"
                        id="search"
                        name="search"
                        class="form-control rounded-3"
                        placeholder="Número de solicitud"
                        value="{{ search or '' }}"
                    >

                </div>

                <div class="col-12 col-md-3">

                    <label class="form-label fw-semibold">
                        Estado
                    </label>

                    <select
                        id="status"
                        name="status"
                        class="form-select rounded-3"
                    >

                        <option value="">Todos</option>

                        <option value="BORRADOR">
                            BORRADOR
                        </option>

                        <option value="ENVIADA">
                            ENVIADA
                        </option>

                        <option value="EN_REVISION_PROVEEDURIA">
                            EN REVISION PROVEEDURIA
                        </option>

                        <option value="PARCIALMENTE_COTIZADA">
                            PARCIALMENTE COTIZADA
                        </option>

                        <option value="COTIZADA">
                            COTIZADA
                        </option>

                        <option value="CONVERTIDA_A_OC">
                            CONVERTIDA A OC
                        </option>

                        <option value="CERRADA">
                            CERRADA
                        </option>

                        <option value="CANCELADA">
                            CANCELADA
                        </option>

                    </select>

                </div>

                <div class="col-12 col-md-3">

                    <label class="form-label fw-semibold">
                        Prioridad
                    </label>

                    <select
                        id="priority"
                        name="priority"
                        class="form-select rounded-3"
                    >

                        <option value="">Todas</option>

                        <option value="NORMAL">
                            NORMAL
                        </option>

                        <option value="URGENTE">
                            URGENTE
                        </option>

                        <option value="CRITICA">
                            CRITICA
                        </option>

                    </select>

                </div>

                <div class="col-12 col-md-2 d-flex align-items-end">

                    <button
                        type="submit"
                        class="btn btn-outline-dark w-100 rounded-3"
                    >

                        <i class="bi bi-search me-2"></i>
                        Filtrar

                    </button>

                </div>

            </form>

        </div>

    </div>

    <div id="requestsTableContainer">

        <div class="card border-0 shadow-sm rounded-4">

            <div class="card-body text-center py-5">

                <div
                    class="spinner-border text-dark mb-3"
                    role="status"
                ></div>

                <div class="fw-semibold">
                    Cargando solicitudes...
                </div>

                <div class="text-muted small mt-2">
                    Espere un momento.
                </div>

            </div>

        </div>

    </div>

</div>

<script>
(function () {

    const container =
        document.getElementById("requestsTableContainer");

    const form =
        document.getElementById("filtersForm");

    async function loadRequests() {

        try {

            const params = new URLSearchParams({
                search: document.getElementById("search").value || "",
                status: document.getElementById("status").value || "",
                priority: document.getElementById("priority").value || ""
            });

            const response = await fetch(
                `/purchases/requests/partial/list?${params.toString()}`,
                {
                    headers: {
                        "X-Requested-With": "XMLHttpRequest"
                    }
                }
            );

            if (!response.ok) {
                throw new Error("Error cargando solicitudes.");
            }

            const html =
                await response.text();

            container.innerHTML = html;

        } catch (error) {

            console.error(error);

            container.innerHTML = `
                <div class="alert alert-danger rounded-4">
                    Error cargando solicitudes.
                </div>
            `;
        }
    }

    form.addEventListener(
        "submit",
        function (e) {

            e.preventDefault();

            loadRequests();
        }
    );

    loadRequests();

})();
</script>

{% endblock %}
