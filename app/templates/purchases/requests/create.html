{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="mb-4">
        <h2 class="fw-bold mb-1">Nueva solicitud de compra</h2>
        <p class="text-muted mb-0">Registra una solicitud corporativa con una o varias líneas.</p>
    </div>

    <form method="POST">
        <div class="row g-4">
            <div class="col-12 col-xl-4">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Datos generales</h5>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Prioridad</label>
                            <select name="priority" class="form-select rounded-3" required>
                                <option value="NORMAL">NORMAL</option>
                                <option value="URGENTE">URGENTE</option>
                                <option value="CRITICA">CRITICA</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Predio sugerido</label>
                            <select name="site_id" class="form-select rounded-3">
                                <option value="">Sin predio</option>
                                {% for site in sites %}
                                <option value="{{ site.id }}">{{ site.name }}</option>
                                {% endfor %}
                            </select>
                            <div class="form-text">Opcional. Solo como referencia inicial.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Bodega sugerida</label>
                            <select name="warehouse_id" class="form-select rounded-3">
                                <option value="">Sin bodega</option>
                                {% for wh in warehouses %}
                                <option value="{{ wh.id }}">{{ wh.code }} - {{ wh.name }}</option>
                                {% endfor %}
                            </select>
                            <div class="form-text">Opcional. La recepción real se define al ingresar a inventario.</div>
                        </div>

                        <div class="mb-0">
                            <label class="form-label fw-semibold">Observaciones</label>
                            <textarea name="notes" class="form-control rounded-3" rows="5"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-xl-8">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
                            <h5 class="fw-bold mb-0">Líneas de solicitud</h5>
                            <button type="button" class="btn btn-outline-dark rounded-3" id="add-line-btn">
                                <i class="bi bi-plus-circle me-2"></i>Agregar línea
                            </button>
                        </div>

                        <div id="lines-wrapper">
                            <div class="request-line border rounded-4 p-3 mb-3 bg-light-subtle">
                                <div class="row g-3">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label fw-semibold">Artículo</label>
                                        <select name="line_article_id[]" class="form-select rounded-3">
                                            <option value="">Seleccionar artículo</option>
                                            {% for article in articles %}
                                            <option value="{{ article.id }}">{{ article.code }} - {{ article.name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="col-12 col-md-6">
                                        <label class="form-label fw-semibold">Artículo pendiente</label>
                                        <select name="line_pending_article_id[]" class="form-select rounded-3">
                                            <option value="">Seleccionar pendiente</option>
                                            {% for pending in pending_articles %}
                                            <option value="{{ pending.id }}">
                                                {{ pending.provisional_code or 'SIN-CODIGO' }} - {{ pending.provisional_name }}
                                            </option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="col-12 col-md-3">
                                        <label class="form-label fw-semibold">Cantidad</label>
                                        <input type="number" step="0.01" min="0" name="line_quantity[]" class="form-control rounded-3">
                                    </div>

                                    <div class="col-12 col-md-3">
                                        <label class="form-label fw-semibold">Unidad</label>
                                        <select name="line_unit_id[]" class="form-select rounded-3">
                                            <option value="">Seleccionar</option>
                                            {% for unit in units %}
                                            <option value="{{ unit.id }}">{{ unit.name if unit.name is defined else unit.code if unit.code is defined else unit.id }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="col-12 col-md-3 d-flex align-items-end">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" name="line_is_urgent[]" value="0">
                                            <label class="form-check-label fw-semibold">Urgente</label>
                                        </div>
                                    </div>

                                    <div class="col-12 col-md-3 d-flex align-items-end justify-content-end">
                                        <button type="button" class="btn btn-outline-danger rounded-3 remove-line-btn">
                                            Eliminar
                                        </button>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Notas de línea</label>
                                        <input type="text" name="line_notes[]" class="form-control rounded-3">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex flex-column flex-md-row gap-2 justify-content-end mt-4">
                            <a href="{{ url_for('purchases.list_requests') }}" class="btn btn-outline-secondary rounded-3">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-dark rounded-3">
                                Guardar solicitud
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<template id="request-line-template">
    <div class="request-line border rounded-4 p-3 mb-3 bg-light-subtle">
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Artículo</label>
                <select name="line_article_id[]" class="form-select rounded-3">
                    <option value="">Seleccionar artículo</option>
                    {% for article in articles %}
                    <option value="{{ article.id }}">{{ article.code }} - {{ article.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Artículo pendiente</label>
                <select name="line_pending_article_id[]" class="form-select rounded-3">
                    <option value="">Seleccionar pendiente</option>
                    {% for pending in pending_articles %}
                    <option value="{{ pending.id }}">
                        {{ pending.provisional_code or 'SIN-CODIGO' }} - {{ pending.provisional_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-3">
                <label class="form-label fw-semibold">Cantidad</label>
                <input type="number" step="0.01" min="0" name="line_quantity[]" class="form-control rounded-3">
            </div>

            <div class="col-12 col-md-3">
                <label class="form-label fw-semibold">Unidad</label>
                <select name="line_unit_id[]" class="form-select rounded-3">
                    <option value="">Seleccionar</option>
                    {% for unit in units %}
                    <option value="{{ unit.id }}">{{ unit.name if unit.name is defined else unit.code if unit.code is defined else unit.id }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 col-md-3 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input line-urgent-checkbox" type="checkbox" name="line_is_urgent[]" value="">
                    <label class="form-check-label fw-semibold">Urgente</label>
                </div>
            </div>

            <div class="col-12 col-md-3 d-flex align-items-end justify-content-end">
                <button type="button" class="btn btn-outline-danger rounded-3 remove-line-btn">
                    Eliminar
                </button>
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Notas de línea</label>
                <input type="text" name="line_notes[]" class="form-control rounded-3">
            </div>
        </div>
    </div>
</template>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const linesWrapper = document.getElementById("lines-wrapper");
    const addLineBtn = document.getElementById("add-line-btn");
    const template = document.getElementById("request-line-template");

    function refreshUrgentCheckboxValues() {
        const lines = linesWrapper.querySelectorAll(".request-line");
        lines.forEach((line, index) => {
            const checkbox = line.querySelector(".line-urgent-checkbox, input[name='line_is_urgent[]']");
            if (checkbox) {
                checkbox.value = index.toString();
            }
        });
    }

    addLineBtn.addEventListener("click", function () {
        const clone = template.content.cloneNode(true);
        linesWrapper.appendChild(clone);
        refreshUrgentCheckboxValues();
    });

    linesWrapper.addEventListener("click", function (event) {
        if (event.target.classList.contains("remove-line-btn")) {
            const line = event.target.closest(".request-line");
            if (!line) return;

            const totalLines = linesWrapper.querySelectorAll(".request-line").length;
            if (totalLines === 1) {
                line.querySelectorAll("input, select").forEach((field) => {
                    if (field.type === "checkbox") {
                        field.checked = false;
                    } else {
                        field.value = "";
                    }
                });
            } else {
                line.remove();
                refreshUrgentCheckboxValues();
            }
        }
    });

    refreshUrgentCheckboxValues();
});
</script>
{% endblock %}
