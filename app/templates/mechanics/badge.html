<!DOCTYPE html>
<html>
<head>
    <title>Gafete</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
</head>
<body style="text-align:center; font-family:Arial;">

    <h2>{{ mechanic.name }}</h2>

    <svg id="barcode"></svg>

    <p>{{ mechanic.code }}</p>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            JsBarcode("#barcode", "{{ mechanic.code }}", {
                format: "CODE128",
                width: 2,
                height: 80,
                displayValue: false
            });
        });
    </script>

</body>
</html>
