{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">

    <h3 class="fw-bold mb-3">{{ form_title }}</h3>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">

            <form method="POST">
                <div class="row g-4">

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Usuario *</label>
                        <input type="text" name="username" class="form-control"
                               value="{{ user.username if user else '' }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Nombre completo *</label>
                        <input type="text" name="full_name" class="form-control"
                               value="{{ user.full_name if user else '' }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Rol *</label>
                        <select name="role_id" class="form-select" required>
                            <option value="">Seleccione</option>
                            {% for r in roles %}
                                <option value="{{ r.id }}"
                                    {% if user and user.role_id == r.id %}selected{% endif %}>
                                    {{ r.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Correo</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ user.email if user else '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Contraseña {% if not user %}*{% endif %}</label>
                        <input type="password" name="password" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Barcode</label>
                        <input type="text" name="barcode_value" class="form-control"
                               value="{{ user.barcode_value if user else '' }}">
                    </div>

                    <!-- PREDIOS -->
                    <div class="col-12">
                        <h6 class="fw-bold mt-3">Predios</h6>
                        <div class="row">
                            {% for s in sites %}
                            <div class="col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="checkbox"
                                           name="site_ids"
                                           value="{{ s.id }}"
                                           {% if s.id in selected_site_ids %}checked{% endif %}>
                                    <label class="form-check-label">{{ s.name }}</label>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <!-- BODEGAS -->
                    <div class="col-12">
                        <h6 class="fw-bold mt-3">Bodegas / Minibodegas / Cajas</h6>

                        {% for site_id, warehouses in warehouses_by_site.items() %}
                            <div class="mt-3">
                                <div class="fw-semibold mb-2">
                                    Predio {{ site_id }}
                                </div>

                                <div class="row">
                                    {% for w in warehouses %}
                                    <div class="col-md-3">
                                        <div class="form-check">
                                            <input class="form-check-input"
                                                   type="checkbox"
                                                   name="warehouse_ids"
                                                   value="{{ w.id }}"
                                                   {% if w.id in selected_warehouse_ids %}checked{% endif %}>
                                            <label class="form-check-label">
                                                {{ w.name }} ({{ w.warehouse_type }})
                                            </label>
                                        </div>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                        {% endfor %}
                    </div>

                    <div class="col-12 mt-4 text-end">
                        <button class="btn btn-primary rounded-pill px-4">
                            {{ submit_label }}
                        </button>
                    </div>

                </div>
            </form>

        </div>
    </div>

</div>
{% endblock %}
