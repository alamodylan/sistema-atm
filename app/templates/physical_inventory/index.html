{% extends "base.html" %}
{% block content %}

<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">Inventario físico</h3>
            <small class="text-muted">Control y ajuste de inventario por bodega</small>
        </div>
    </div>

    <!-- CREAR INVENTARIO -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form method="POST" action="{{ url_for('physical_inventory.create') }}">
                <div class="row g-2 align-items-end">

                    <div class="col-md-4">
                        <label class="form-label">Bodega</label>
                        <select name="warehouse_id" class="form-select" required>
                            <option value="">Seleccione...</option>
                            {% for w in warehouses %}
                                <option value="{{ w.id }}">{{ w.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Notas</label>
                        <input type="text" name="notes" class="form-control">
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-dark w-100">
                            Crear inventario
                        </button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- LISTADO -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">

            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Número</th>
                        <th>Bodega</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>

                {% for inv in inventories %}
                    <tr>
                        <td>{{ inv.number }}</td>
                        <td>{{ inv.warehouse.name }}</td>
                        <td>
                            <span class="badge bg-secondary">{{ inv.status }}</span>
                        </td>
                        <td>{{ inv.created_at|cr_datetime }}</td>
                        <td>
                            <a href="{{ url_for('physical_inventory.detail', inventory_id=inv.id) }}"
                               class="btn btn-sm btn-outline-dark">
                                Abrir
                            </a>
                        </td>
                    </tr>
                {% endfor %}

                </tbody>
            </table>

        </div>
    </div>

</div>

{% endblock %}
